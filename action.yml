name: "Multi-Agent Review Aggregator"
description: "Сводит находки нескольких ИИ-ревьюеров в один консенсус-обзор PR с однокликовыми правками."
author: "sodazzzzzz"

branding:
  icon: "users"
  color: "purple"

inputs:
  github-token:
    description: "Токен для постинга review/коммента (нужно pull-requests: write)."
    required: true
  pr-number:
    description: "Номер PR, к которому постим обзор."
    required: true
  reviews-dir:
    description: "Директория с артефактами агентов (рекурсивно ищутся review-*.json)."
    required: false
    default: "reviews"
  diff-path:
    description: "Путь к unified diff PR (для однокликовых suggestion). Пусто → только summary."
    required: false
    default: ""
  fail-on:
    description: "Когда валить чек: none | p0 | consensus-p0. По умолчанию advisory (не блокирует)."
    required: false
    default: "none"
  expected-agents:
    description: "Ожидаемая панель агентов (через запятую) — для меток N/M и пометок «не отработал»."
    required: false
    default: "claude,codex,deepseek"
  cluster-window:
    description: "Окно строк для слияния близких находок в один кластер."
    required: false
    default: "3"
  polish-model:
    description: "Модель Claude для причёсывания прозы (best-effort; требует claude в PATH)."
    required: false
    default: "claude-opus-4-8"
  claude-bin:
    description: "Бинарь claude для причёсывания. Если недоступен — текст остаётся детерминированным."
    required: false
    default: "claude"
  claude-oauth-token:
    description: "OAuth-токен Claude для Polish (авторизует claude CLI в контейнере). Пусто → Polish деградирует к детерминированному тексту."
    required: false
    default: ""
  target-repo:
    description: "Целевой репозиторий owner/repo для постинга обзора. Пусто → GITHUB_REPOSITORY (само-ревью). Центральный App-режим задаёт сторонний репо."
    required: false
    default: ""
  relay-url:
    description: "База URL реле для реран-ссылки в обзоре (напр. https://mar-relay.example). Пусто → ссылки нет."
    required: false
    default: ""
  rerun-secret:
    description: "HMAC-секрет подписи реран-ссылок (общий с реле). Пусто → ссылки нет."
    required: false
    default: ""

outputs:
  clusters:
    description: "Число кластеров находок в обзоре."
  blocking:
    description: "true, если сработало правило fail_on (чек красный)."
  summary_url:
    description: "URL запощенного summary-коммента."

runs:
  using: "docker"
  # Релизный образ из GHCR (собирается release.yml на тег v*) — не пересобираем Dockerfile
  # на каждый прогон. Версия пинится явно; бампится вместе с новым тегом релиза.
  image: "docker://ghcr.io/sodazzzzzz/multi-agent-review:0.3.0"
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    PR_NUMBER: ${{ inputs.pr-number }}
    # GITHUB_REPOSITORY здесь НЕ маппим: в action.yml контекст github.* недоступен (только
    # inputs.*), и явный `${{ github.repository }}` ломал загрузку экшена. GitHub сам
    # прокидывает дефолтные GITHUB_* в docker-экшен, так что CLI.client_from_env его получит.
    REVIEWS_DIR: ${{ inputs.reviews-dir }}
    DIFF_PATH: ${{ inputs.diff-path }}
    FAIL_ON: ${{ inputs.fail-on }}
    EXPECTED_AGENTS: ${{ inputs.expected-agents }}
    CLUSTER_WINDOW: ${{ inputs.cluster-window }}
    POLISH_MODEL: ${{ inputs.polish-model }}
    CLAUDE_BIN: ${{ inputs.claude-bin }}
    CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-oauth-token }}
    TARGET_REPO: ${{ inputs.target-repo }}
    RELAY_URL: ${{ inputs.relay-url }}
    RERUN_SECRET: ${{ inputs.rerun-secret }}
