version: 2
updates:
  # Elixir/Hex dependencies (mix project lives under aggregator/).
  # Dependabot's ecosystem id for Elixir/Hex is "mix", not "hex".
  - package-ecosystem: mix
    directory: "/aggregator"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
