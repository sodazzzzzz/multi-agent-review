name: multi-agent-review

# Авто-ревью при ОТКРЫТИИ PR; повторный прогон — командой-комментом `/rerun-review`
# (гейт по author_association). На synchronize авто-ревью НЕТ (экономим токены).
on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  # aggregate тянет релизный образ действия из GHCR (action.yml image: docker://ghcr.io/...);
  # для pull приватного пакета того же репо джобе нужен packages: read.
  packages: read

# Один прогон на PR за раз. cancel-in-progress: FALSE — НЕ отменяем на лету: codex
# рефрешит ОДНОРАЗОВЫЙ токен и persist'ит его в конце; отмена посреди рефреша осиротила
# бы токен (warmup это не чинит — токен уже израсходован). Дубли /rerun-review просто
# встают в очередь (авто-ревью на synchronize и так нет, так что пуши прогон не плодят).
concurrency:
  group: review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # Решаем, запускать ли пайплайн, и достаём pr/base/head. Дремлет, пока в репо не
  # выставлена переменная ENABLE_REVIEW=true (иначе бот молчит на каждом PR/комменте).
  gate:
    if: ${{ vars.ENABLE_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
      pr: ${{ steps.decide.outputs.pr }}
      head: ${{ steps.decide.outputs.head }}
      base: ${{ steps.decide.outputs.base }}
      base_ref: ${{ steps.decide.outputs.base_ref }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PR_EVENT_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
          PR_EVENT_BASE: ${{ github.event.pull_request.base.sha }}
          PR_EVENT_BASE_REF: ${{ github.event.pull_request.base.ref }}
          # Пользовательский ввод — ТОЛЬКО через env (инъекция в `run` исключена):
          IS_PR_COMMENT: ${{ github.event.issue.pull_request.url != '' }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ASSOC: ${{ github.event.comment.author_association }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          run=false; pr=""; head=""; base=""; base_ref=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            run=true
            pr="$PR_EVENT_NUMBER"; head="$PR_EVENT_HEAD"
            base="$PR_EVENT_BASE"; base_ref="$PR_EVENT_BASE_REF"
          elif [ "$EVENT_NAME" = "issue_comment" ] && [ "$IS_PR_COMMENT" = "true" ]; then
            cmd="$(printf '%s' "$COMMENT_BODY" | tr -d '[:space:]')"
            if [ "$cmd" = "/rerun-review" ] \
               && printf '%s\n' OWNER MEMBER COLLABORATOR | grep -qx "$COMMENT_ASSOC"; then
              pr="$ISSUE_NUMBER"
              # base.sha/head.sha — замороженный дифф PR; base.ref — имя базовой ветки
              # (её tip берём для доверенных скриптов). Имя ветки без пробелов → read ок.
              read -r base head base_ref <<<"$(gh api "repos/$REPO/pulls/$pr" \
                --jq '"\(.base.sha) \(.head.sha) \(.base.ref)"')"
              run=true
            fi
          fi

          {
            echo "run=$run"; echo "pr=$pr"; echo "head=$head"
            echo "base=$base"; echo "base_ref=$base_ref"
          } >>"$GITHUB_OUTPUT"
          echo "gate: run=$run pr=$pr base=$base base_ref=$base_ref head=$head"

  # Считаем diff PR один раз. Скрипты берём с TIP базовой ветки (доверенные и ВСЕГДА
  # свежие — фиксы скриптов подхватываются уже открытыми PR), а сам diff заморожен на
  # base.sha..head.sha. fetch-depth: 0 — чтобы base.sha был достижим из tip для diff.
  prepare:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.base_ref }}
          fetch-depth: 0
      - name: Fetch PR head and base
        env:
          PR: ${{ needs.gate.outputs.pr }}
          BASE: ${{ needs.gate.outputs.base }}
        run: |
          git fetch --no-tags origin "refs/pull/${PR}/head"
          # base.sha обычно уже в истории базовой ветки (fetch-depth: 0). Если её
          # форс-пушнули и коммит осиротел — тянем явно (best-effort; GitHub отдаёт
          # достижимые SHA). Иначе three-dot diff упал бы на «not a valid object».
          git fetch --no-tags origin "$BASE" || true
      - name: Построить diff
        env:
          BASE: ${{ needs.gate.outputs.base }}
          HEAD: ${{ needs.gate.outputs.head }}
        run: bash scripts/get_diff.sh "$BASE" "$HEAD" diff.patch changed-files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: diff
          path: diff.patch
          if-no-files-found: error

  claude:
    needs: [gate, prepare]
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.base_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: diff
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: bash scripts/review_claude.sh diff.patch review-claude.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-claude
          path: review-claude.json
          if-no-files-found: ignore

  deepseek:
    needs: [gate, prepare]
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.base_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: diff
      - name: Review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: bash scripts/review_deepseek.sh diff.patch review-deepseek.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-deepseek
          path: review-deepseek.json
          if-no-files-found: ignore

  # Третий агент — Codex (ChatGPT-план). Opt-in по vars.ENABLE_CODEX: без него джоб
  # дремлет, а панель остаётся 2-агентной (см. expected-agents в aggregate). Auth —
  # round-trip: restore из секрета → codex exec → persist обновлённого auth.json назад
  # (refresh-токен одноразовый). Скрипты с tip base-ветки; diff — это данные (read-only sandbox).
  codex:
    needs: [gate, prepare]
    if: needs.gate.outputs.run == 'true' && vars.ENABLE_CODEX == 'true'
    runs-on: ubuntu-latest
    # Таймаут, чтобы зависший codex exec не держал вечно lock codex-auth (иначе
    # заблокирует ВСЕ codex-ревью и warmup).
    timeout-minutes: 15
    # Сериализуем ВСЕ codex-джобы (и warmup) глобально и НЕ отменяем: refresh-токен
    # одноразовый, отмена посреди рефреша осиротит токен. cancel-in-progress: false → очередь.
    concurrency:
      group: codex-auth
      cancel-in-progress: false
    env:
      CODEX_HOME: ${{ github.workspace }}/.codex
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.base_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: diff
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Restore Codex auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash scripts/codex_auth.sh restore
      - name: Review
        env:
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
        run: bash scripts/review_codex.sh diff.patch review-codex.json
      # Сохраняем обновлённый токен ВСЕГДА (codex мог рефрешнуть и до падения ревью).
      - name: Persist refreshed Codex auth
        if: always()
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          GH_TOKEN: ${{ secrets.CODEX_SECRETS_PAT }}
        run: bash scripts/codex_auth.sh persist
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-codex
          path: review-codex.json
          if-no-files-found: ignore

  # Сводим всё в один обзор. if: always() — упавший агент не отменяет агрегацию.
  aggregate:
    needs: [gate, claude, deepseek, codex]
    if: always() && needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.base_ref }}
      # download-artifact кладёт каждый артефакт в свою подпапку:
      # _artifacts/review-<agent>/review-<agent>.json (матчит **/review-*.json),
      # _artifacts/diff/diff.patch. Поэтому reviews-dir = _artifacts напрямую.
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Aggregate & post
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ needs.gate.outputs.pr }}
          reviews-dir: _artifacts
          diff-path: _artifacts/diff/diff.patch
          fail-on: ${{ vars.FAIL_ON || 'none' }}
          # Токен для Polish: claude CLI в контейнере причёсывает прозу. Без него
          # (или при сбое) Aggregator.Claude молча деградирует к детерминированному тексту.
          claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          polish-model: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-8' }}
          # Панель зависит от того, включён ли Codex: 3/3 при ENABLE_CODEX, иначе 2/2
          # (чтобы не маячило вечное «codex не отработал», когда его и не звали).
          expected-agents: ${{ vars.ENABLE_CODEX == 'true' && 'claude,codex,deepseek' || 'claude,deepseek' }}
